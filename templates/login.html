<!DOCTYPE html>

<html lang="en">



<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>FitAlgorithm - Welcome</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">



    <style>
        * {

            box-sizing: border-box;

            margin: 0;

            padding: 0;

            font-family: 'Poppins', sans-serif;

        }



        /* Premium Gym Background Image with Dark Overlay */

        body {

            background: linear-gradient(rgba(15, 15, 15, 0.75), rgba(15, 15, 15, 0.85)),

                url('https://marketplace.canva.com/EAGE5zu7jDw/1/0/1067w/canva-black-sport-gym-photo-collage-MkqN1i32ZAk.jpg') center/cover no-repeat fixed;

            height: 100vh;

            display: flex;

            align-items: center;

            justify-content: center;

            color: #333;

        }



        /* Premium Glassmorphism Form Card */

        .login-wrapper {

            background: rgba(255, 255, 255, 0.95);

            backdrop-filter: blur(10px);

            width: 100%;

            max-width: 420px;

            padding: 45px 40px;

            border-radius: 20px;

            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5);

            border: 1px solid rgba(255, 255, 255, 0.1);

            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);

        }



        @keyframes slideUp {

            from {

                opacity: 0;

                transform: translateY(30px);

            }



            to {

                opacity: 1;

                transform: translateY(0);

            }

        }



        .logo {

            text-align: center;

            font-size: 32px;

            font-weight: 700;

            color: #5A2E14;

            margin-bottom: 5px;

            letter-spacing: -0.5px;

        }



        /* Logo Span completely changed to Black */

        .logo span {

            color: #000000;

        }



        .subtitle {

            text-align: center;

            color: #777;

            font-size: 14px;

            margin-bottom: 35px;

            font-weight: 300;

        }



        .input-group {

            margin-bottom: 22px;

        }



        .input-group label {

            display: block;

            font-size: 13px;

            font-weight: 600;

            color: #444;

            margin-bottom: 8px;

            text-transform: uppercase;

            letter-spacing: 0.5px;

        }



        .input-group input {

            width: 100%;

            padding: 14px 15px;

            border: 2px solid #eee;

            border-radius: 10px;

            font-size: 15px;

            transition: 0.3s;

            background: #fafafa;

        }



        /* Input Focus Border completely changed to Black */

        .input-group input:focus {

            border-color: #000000;

            background: #fff;

            outline: none;

            box-shadow: 0 0 0 4px rgba(0, 0, 0, 0.1);

        }



        /* Button Gradient completely changed to Black/Dark Grey */

        .btn {

            width: 100%;

            padding: 15px;

            background: linear-gradient(135deg, #2b2b2b, #000000);

            color: #fff;

            border: none;

            border-radius: 10px;

            font-size: 16px;

            font-weight: 600;

            cursor: pointer;

            transition: 0.3s;

            margin-top: 10px;

            letter-spacing: 1px;

            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);

        }



        .btn:hover {

            transform: translateY(-2px);

            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.6);

        }



        .toggle-text {

            text-align: center;

            margin-top: 25px;

            font-size: 14px;

            color: #666;

        }



        /* Link text completely changed to Black */

        .toggle-text span {

            color: #000000;

            font-weight: 600;

            cursor: pointer;

            transition: 0.3s;

        }



        .toggle-text span:hover {

            text-decoration: underline;

            color: #333333;

        }



        /* Flash Messages */

        .flash-message {

            padding: 12px;

            border-radius: 8px;

            text-align: center;

            margin-bottom: 20px;

            font-size: 13px;

            font-weight: 600;

        }



        .flash-success {

            background: #e6f4ea;

            color: #1e8e3e;

            border: 1px solid #ceead6;

        }



        .flash-error {

            background: #fce8e6;

            color: #d93025;

            border: 1px solid #fad2cf;

        }
    </style>

</head>



<body>



    <div class="login-wrapper">

        <div class="logo">Fit<span>Algorithm</span></div>

        <div class="subtitle" id="form-subtitle">Login to your account</div>



        {% with messages = get_flashed_messages(with_categories=true) %}

        {% if messages %}

        {% for category, message in messages %}

        <div class="flash-message flash-{{ category }}">{{ message }}</div>

        {% endfor %}

        {% endif %}

        {% endwith %}



        <form id="login-form" action="/login" method="POST">

            <div class="input-group">

                <label>Username</label>

                <input type="text" name="username" placeholder="Enter your username" required>

            </div>

            <div class="input-group">

                <label>Password</label>

                <input type="password" name="password" placeholder="Enter your password" required>

            </div>

            <button type="submit" class="btn">LOGIN</button>

            <div class="toggle-text">Don't have an account? <span onclick="toggleForm()">Sign up here</span></div>

        </form>



        <form id="register-form" action="/register" method="POST" style="display: none;">

            <div class="input-group">

                <label>Choose Username</label>

                <input type="text" name="username" placeholder="Create a new username" required>

            </div>

            <div class="input-group">

                <label>Create Password</label>

                <input type="password" name="password" placeholder="Create a strong password" required>

            </div>

            <button type="submit" class="btn">CREATE ACCOUNT</button>

            <div class="toggle-text">Already have an account? <span onclick="toggleForm()">Login here</span></div>

        </form>



    </div>



    <script>

        function toggleForm() {

            var loginForm = document.getElementById('login-form');

            var registerForm = document.getElementById('register-form');

            var subtitle = document.getElementById('form-subtitle');



            if (loginForm.style.display === 'none') {

                loginForm.style.display = 'block';

                registerForm.style.display = 'none';

                subtitle.innerText = 'Login to your account';

            } else {

                loginForm.style.display = 'none';

                registerForm.style.display = 'block';

                subtitle.innerText = 'Start your fitness journey today';

            }

        }

    </script>

</body>



</html>
