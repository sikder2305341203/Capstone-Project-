<!DOCTYPE html>
<html lang="en">

<head>
    <title>Fitness Capstone - Login</title>
    <style>
        body {
            font-family: 'Georgia', serif;
            text-align: center;
            margin: 0;
            background-color: #F3EFE3;
            color: #5A2E14;
        }

        /* Top Navigation Bar Design */
        .top-nav {
            display: flex;
            justify-content: flex-end;
            padding: 30px 50px;
            gap: 20px;
        }

        /* Button Design */
        .blob-btn {
            font-family: 'Brush Script MT', 'Comic Sans MS', cursive;
            font-size: 26px;
            text-decoration: none;
            padding: 15px 40px;
            display: inline-block;
            transition: transform 0.3s ease;
            border: none;
            cursor: pointer;
        }

        .btn-login {
            background-color: #5A2E14;
            color: white;
            border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%;
        }

        .btn-join {
            background-color: #8AB83A;
            color: #2c160a;
            border-radius: 40% 60% 70% 30% / 50% 60% 30% 60%;
        }

        .blob-btn:hover {
            transform: scale(1.1) rotate(-3deg);
        }

        /* Form Box */
        .box {
            background: rgba(255, 255, 255, 0.5);
            padding: 40px;
            width: 350px;
            margin: auto;
            border-radius: 15px;
            border: 2px dashed #8AB83A;
            margin-top: 20px;
            min-height: 250px;
        }

        h3 {
            font-family: 'Brush Script MT', cursive;
            font-size: 30px;
            margin-bottom: 20px;
        }

        input {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #c8bca7;
            border-radius: 20px;
            background-color: #FAF8F2;
            font-size: 16px;
            outline: none;
        }

        /* Flash Messages */
        .flash-msg {
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>

<body>

    <div class="top-nav">
        <span class="blob-btn btn-login" onclick="showLogin()">Login</span>
        <span class="blob-btn btn-join" onclick="showSignup()">Signup</span>
    </div>

    <div class="box">
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="flash-msg {{ category }}">{{ message }}</div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <div id="login-section">
            <h3>Login to your account</h3>
            <form action="/login" method="POST">
                <input type="text" name="username" placeholder="Your Name" required>
                <input type="password" name="password" placeholder="Password" required>
                <button type="submit" class="blob-btn btn-login"
                    style="font-size: 20px; margin-top: 20px;">Submit</button>
            </form>
        </div>

        <div id="signup-section" style="display: none;">
            <h3>Create an Account</h3>
            <form action="/register" method="POST">
                <input type="text" name="username" placeholder="New Username" required>
                <input type="password" name="password" placeholder="New Password" required>
                <button type="submit" class="blob-btn btn-join"
                    style="font-size: 20px; margin-top: 20px;">Register</button>
            </form>
        </div>
    </div>

    <script>
        function showLogin() {
            document.getElementById('login-section').style.display = 'block';
            document.getElementById('signup-section').style.display = 'none';
        }

        function showSignup() {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('signup-section').style.display = 'block';
        }
    </script>
</body>

</html>
