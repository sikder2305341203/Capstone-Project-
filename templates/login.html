<!DOCTYPE html>
<html lang="en">
<head>
    <title>Fitness Capstone - Login</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            padding: 50px; 
            margin: 0;
            /* Niche sundor ekta dark fitness background add kora hoyeche */
            background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48?q=80&w=1920&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        
        .box { 
            /* Box take ektu transparent/glass effect dewa hoyeche */
            background: rgba(255, 255, 255, 0.9); 
            padding: 30px; 
            width: 320px; 
            margin: auto; 
            border-radius: 15px; 
            box-shadow: 0px 10px 30px rgba(0,0,0,0.5); 
            margin-top: 50px;
        }

        h2, h3 { color: #333; margin-bottom: 10px;}
        
        input, button { 
            width: 90%; 
            padding: 12px; 
            margin: 10px 0; 
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 15px;
        }
        
        button { 
            background-color: #28a745; 
            color: white; 
            border: none; 
            cursor: pointer; 
            font-weight: bold;
            transition: 0.3s;
        }
        
        button:hover {
            background-color: #218838;
        }

        .register-btn {
            background-color: #007bff;
        }
        
        .register-btn:hover {
            background-color: #0056b3;
        }
        
        hr { border: 0.5px solid #ddd; margin: 20px 0; }
    </style>
</head>
<body>
    <div class="box">
        <h2>💪 Fitness Pro</h2>
        
        <h3>Login</h3>
        <form action="/login" method="POST">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>

        <hr>

        <h3>Create Account</h3>
        <form action="/register" method="POST">
            <input type="text" name="username" placeholder="New Username" required>
            <input type="password" name="password" placeholder="New Password" required>
            <button type="submit" class="register-btn">Register</button>
        </form>
    </div>
</body>
</html>
