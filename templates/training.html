<script>
    function filterWorkout(category, btnElement) {
        let buttons = document.querySelectorAll('.filter-btn');
        buttons.forEach(btn => btn.classList.remove('active'));
        btnElement.classList.add('active');

        let items = document.querySelectorAll('.ex-item');
        items.forEach(item => {
            if (category === 'all' || item.getAttribute('data-category') === category) {
                item.style.display = 'list-item';
            } else {
                item.style.display = 'none';
            }
        });
    }

    // ================= WORKOUT TRACKER =================
    const checkboxes = document.querySelectorAll('.workout-check');
    const progressBar = document.getElementById('progressBar');
    const progressText = document.getElementById('progressText');
    const motivationMsg = document.getElementById('motivationMsg');

    function updateProgress() {
        const total = checkboxes.length;
        const checked = document.querySelectorAll('.workout-check:checked').length;

        const percent = Math.round((checked / total) * 100);

        progressBar.style.width = percent + "%";
        progressText.innerText = percent + "% Completed";

        // Motivation logic
        if (percent === 100) {
            motivationMsg.innerText = "🔥 Amazing! Full workout completed!";
            motivationMsg.style.color = "#27ae60";
        } else if (percent >= 50) {
            motivationMsg.innerText = "💪 Great progress! Keep going!";
            motivationMsg.style.color = "#f1c40f";
        } else {
            motivationMsg.innerText = "🚀 Start strong! You can do it!";
            motivationMsg.style.color = "#e74c3c";
        }

        // Save progress
        localStorage.setItem("workoutProgress", percent);
    }

    // Load saved progress
    window.onload = () => {
        const saved = localStorage.getItem("workoutProgress");
        if (saved) {
            progressBar.style.width = saved + "%";
            progressText.innerText = saved + "% Completed";
        }
    };

    checkboxes.forEach(cb => {
        cb.addEventListener('change', updateProgress);
    });
</script>
