<!DOCTYPE html>
<html lang="en">

<head>
    <title>Setup Profile</title>
    <style>
        body {
            font-family: 'Georgia', serif;
            text-align: center;
            background-color: #F3EFE3;
            color: #5A2E14;
            padding-top: 50px;
        }

        .box {
            background: rgba(255, 255, 255, 0.7);
            padding: 40px;
            width: 400px;
            margin: auto;
            border-radius: 15px;
            border: 2px dashed #8AB83A;
        }

        input,
        select {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #c8bca7;
            border-radius: 10px;
        }

        .btn {
            background-color: #8AB83A;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 20px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 15px;
        }
    </style>
</head>

<body>
    <div class="box">
        <h2>Tell us about yourself</h2>
        <form method="POST">
            <input type="number" name="age" placeholder="Age" required>
            <input type="number" step="0.1" name="weight" placeholder="Weight (kg)" required>
            <input type="number" step="0.1" name="height" placeholder="Height (cm)" required>
            <select name="goal" required>
                <option value="" disabled selected>Select Your Goal</option>
                <option value="Weight Loss">Weight Loss</option>
                <option value="Weight Gain">Weight Gain</option>
                <option value="Maintenance">Maintenance</option>
            </select>
            <select name="workout_location" required>
                <option value="" disabled selected>Where will you workout?</option>
                <option value="Home">Home (No Equipment)</option>
                <option value="Gym">Gym (Weights & Machines)</option>
            </select>
            <select name="activity" required>
                <option value="" disabled selected>Favorite Activity</option>
                <option value="Walking">Walking</option>
                <option value="Running">Running</option>
                <option value="Weightlifting">Weightlifting</option>
                <option value="Yoga">Yoga</option>
            </select>
            <button type="submit" class="btn">Save Profile</button>
        </form>
    </div>
</body>

</html>
