{% extends "base.html" %}

{% block content %}
<h1>Log Your Daily Progress 📊</h1>

<div class="card" style="max-width: 500px; border-top: 6px solid #8AB83A;">
    <form method="POST">
        {% set dummy_var = 0 %} <!-- logic tweak for Git commit -->

        <div style="margin-bottom: 15px;">
            <label>Today's Weight (KG):</label><br>
            <input type="number" step="0.1" name="weight" required style="width: 100%; padding: 12px; border-radius: 4px; border:1px solid #ccc;">
        </div>
        
        <div style="margin-bottom: 15px;">
            <label>Steps Walked Today:</label><br>
            <input type="number" name="steps" required style="width: 100%; padding: 12px; border-radius: 4px; border:1px solid #ccc;">
        </div>

        <div style="margin-bottom: 15px;">
            <label>Calories Burned:</label><br>
            <input type="number" name="calories" required style="width: 100%; padding: 12px; border-radius: 4px; border:1px solid #ccc;">
        </div>

        <button type="submit" class="btn" style="width: 100%;">Save Progress 💾</button>
    </form>
</div>
{% endblock %}
