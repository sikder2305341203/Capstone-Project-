{% extends "base.html" %}

{% block content %}
<h1>Log Your Daily Progress</h1>

<form method="POST" onsubmit="return validateForm()">

    <p style="color: #888; font-size: 14px;">
        📅 Today: <span id="todayDate"></span>
    </p>

    <div style="margin-bottom: 15px;">
        <label>Today's Weight (KG):</label><br>
        <input type="number" step="0.1" id="weight" name="weight" required 
        style="width: 100%; padding: 10px; margin-top: 5px;">
    </div>

    <div style="margin-bottom: 15px;">
        <label>Steps Walked Today:</label><br>
        <input type="number" id="steps" name="steps" required 
        style="width: 100%; padding: 10px; margin-top: 5px;">
    </div>

    <div style="margin-bottom: 15px;">
        <label>Calories Burned (Active):</label><br>
        <input type="number" id="calories" name="calories" required 
        style="width: 100%; padding: 10px; margin-top: 5px;">
    </div>

    <button type="submit" class="btn" style="width: 100%; font-size: 16px;">
        Save Progress
    </button>

    <div id="feedbackMsg" style="margin-top: 15px; font-weight: bold;"></div>
</form>
