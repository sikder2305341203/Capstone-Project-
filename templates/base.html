<script>
    // ================= DARK MODE =================
    const toggleBtn = document.getElementById('darkModeToggle');
    const body = document.body;

    if (localStorage.getItem('theme') === 'dark') {
        body.classList.add('dark-mode');
        toggleBtn.innerHTML = '☀️ Light Glass';
    }

    toggleBtn.addEventListener('click', function (e) {
        e.preventDefault();
        body.classList.toggle('dark-mode');

        localStorage.setItem('theme',
            body.classList.contains('dark-mode') ? 'dark' : 'light'
        );

        toggleBtn.innerHTML = body.classList.contains('dark-mode')
            ? '☀️ Light Glass'
            : '🌙 Dark Glass';
    });

    // ================= BMI MODULE =================
    let currentUnit = 'metric';

    const modal = document.getElementById('bmiModal');
    const resultArea = document.getElementById('bmiResultArea');

    function openBMIModal() {
        modal.style.display = 'block';

        // Load last saved result
        const lastBMI = localStorage.getItem('lastBMI');
        if (lastBMI) {
            resultArea.style.display = 'block';
            resultArea.innerHTML = lastBMI;
        }
    }

    function closeBMIModal() {
        modal.style.display = 'none';
    }

    // Close on ESC key
    window.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') closeBMIModal();
    });

    // Close on outside click
    window.addEventListener('click', (e) => {
        if (e.target === modal) closeBMIModal();
    });

    function setUnit(unit) {
        currentUnit = unit;

        document.getElementById('metricInputs').style.display =
            (unit === 'metric') ? 'block' : 'none';

        document.getElementById('usInputs').style.display =
            (unit === 'us') ? 'block' : 'none';

        document.getElementById('btnMetric').classList.toggle('active', unit === 'metric');
        document.getElementById('btnUS').classList.toggle('active', unit === 'us');

        resultArea.style.display = 'none';
    }

    // ================= CORE BMI LOGIC =================
    function calculateBMI() {
        let bmi = calculateValue();

        if (!bmi) return;

        bmi = bmi.toFixed(1);

        const { category, bgColor, textColor, advice } = getBMICategory(bmi);

        const html = `
            Your BMI is <span style="font-size: 24px;">${bmi}</span><br>
            <small>${category}</small><br>
            <small style="font-weight: normal;">${advice}</small>
        `;

        resultArea.style.display = 'block';
        resultArea.style.background = bgColor;
        resultArea.style.color = textColor;
        resultArea.innerHTML = html;

        // Save result
        localStorage.setItem('lastBMI', html);
    }

    function calculateValue() {
        if (currentUnit === 'metric') {
            const weight = parseFloat(document.getElementById('bmiWeightKg').value);
            const heightCm = parseFloat(document.getElementById('bmiHeightCm').value);

            if (!isValid(weight, heightCm)) {
                alert("Please enter valid weight and height!");
                return null;
            }

            const heightM = heightCm / 100;
            return weight / (heightM * heightM);
        } else {
            const weight = parseFloat(document.getElementById('bmiWeightLbs').value);
            const ft = parseFloat(document.getElementById('bmiHeightFt').value) || 0;
            const inch = parseFloat(document.getElementById('bmiHeightIn').value) || 0;

            if (!isValid(weight) || (ft === 0 && inch === 0)) {
                alert("Please enter valid weight and height!");
                return null;
            }

            const totalInches = (ft * 12) + inch;
            return 703 * (weight / (totalInches * totalInches));
        }
    }

    function isValid(...values) {
        return values.every(v => v && v > 0);
    }

    function getBMICategory(bmi) {
        if (bmi < 18.5) {
            return {
                category: 'Underweight ⚠️',
                bgColor: '#3498db',
                textColor: '#fff',
                advice: 'Consider increasing calorie intake and strength training.'
            };
        }
        else if (bmi < 24.9) {
            return {
                category: 'Normal Weight ✅',
                bgColor: '#2ecc71',
                textColor: '#fff',
                advice: 'Maintain your current lifestyle and balanced diet.'
            };
        }
        else if (bmi < 29.9) {
            return {
                category: 'Overweight ⚠️',
                bgColor: '#f1c40f',
                textColor: '#333',
                advice: 'Focus on cardio exercise and controlled diet.'
            };
        }
        else {
            return {
                category: 'Obese 🔴',
                bgColor: '#e74c3c',
                textColor: '#fff',
                advice: 'Consult a doctor and follow a structured fitness plan.'
            };
        }
    }
</script>
