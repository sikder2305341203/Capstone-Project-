<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>🌿 FitAlgorithm Pro Dashboard</title> <!-- Git-detectable cosmetic change -->
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background-color: #f0f5f5;
            display: flex;
        }

        .sidebar {
            width: 260px;
            background-color: #5A2E14;
            color: white;
            height: 100vh;
            position: fixed;
            padding-top: 25px;
            box-shadow: 2px 0 8px rgba(0, 0, 0, 0.1);
        }

        .sidebar h2 {
            text-align: center;
            color: #8AB83A;
            margin-bottom: 35px;
            font-size: 22px;
        }

        .sidebar a {
            display: block;
            color: white;
            padding: 16px 22px;
            text-decoration: none;
            border-bottom: 1px solid #734020;
            transition: 0.3s;
            font-weight: 500;
        }

        .sidebar a:hover {
            background-color: #8AB83A;
            padding-left: 36px;
            border-radius: 4px;
        }

        .main-content {
            margin-left: 260px;
            padding: 30px;
            width: calc(100% - 260px);
        }

        .card {
            background: white;
            padding: 22px;
            border-radius: 10px;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.12);
            margin-bottom: 25px;
            transition: 0.2s all;
        }

        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 15px rgba(0, 0, 0, 0.18);
        }

        .btn {
            background-color: #8AB83A;
            color: white;
            padding: 12px 20px;
            text-decoration: none;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.2s all;
        }

        .btn:hover {
            background-color: #72942c;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th,
        td {
            padding: 14px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        th {
            background-color: #f9f9f9;
        }
    </style>
</head>

<body>
    <div class="sidebar">
        <h2>🌿 FitAlgorithm Pro</h2>
        <a href="/dashboard">📊 Dashboard</a>
        <a href="/training">🏋️ Training Program</a>
        <a href="/log_progress">📝 Log Daily Progress</a>
        <a href="/about">ℹ️ About Us</a>
        <a href="/contact">📞 Contact Us</a>
        <a href="/research">🎓 University Research</a>
        <a href="/logout" style="color: #ffcccc;">🚪 Logout</a>
    </div>

    <div class="main-content">
        {% block content %}{% endblock %}
    </div>

    <!-- Base template updated for minor visual tweaks -->
</body>

</html>
