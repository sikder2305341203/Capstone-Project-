<script>
    const dates = [];
    const weights = [];

    {% for row in history %}
    dates.push("{{ row[2] }}");
    weights.push({{ row[3] }});
    {% endfor %}

    // Detect trend
    let trend = "";
    if (weights.length >= 2) {
        if (weights[weights.length - 1] > weights[0]) {
            trend = "📈 Weight Increasing";
        } else if (weights[weights.length - 1] < weights[0]) {
            trend = "📉 Weight Decreasing";
        } else {
            trend = "➡️ Stable";
        }
    }

    // Show trend above chart
    const trendDiv = document.createElement("div");
    trendDiv.innerHTML = `<strong>${trend}</strong>`;
    trendDiv.style.marginBottom = "10px";
    trendDiv.style.color = "#8AB83A";
    document.getElementById("weightChart").parentNode.prepend(trendDiv);

    // BMI constant line
    const bmiLine = Array(weights.length).fill({{ bmi }});

    const ctx = document.getElementById('weightChart').getContext('2d');

    new Chart(ctx, {
        type: 'line',
        data: {
            labels: dates.reverse(),
            datasets: [
                {
                    label: 'Weight (kg)',
                    data: weights.reverse(),
                    borderColor: '#d35400',
                    backgroundColor: 'rgba(211, 84, 0, 0.2)',
                    borderWidth: 2,
                    tension: 0.3,
                    fill: true
                },
                {
                    label: 'BMI Level',
                    data: bmiLine,
                    borderColor: '#2980b9',
                    borderDash: [5,5],
                    borderWidth: 2,
                    fill: false
                }
            ]
        },
        options: {
            responsive: true,
            plugins: {
                legend: { display: true }
            }
        }
    });
</script>
